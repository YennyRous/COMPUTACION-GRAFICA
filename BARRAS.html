<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAFICO DE BARRAS</title>
   </head>
<body>
    <h2>Gráfico de Barras</h2>
    <canvas id="myCanvas" width="700" height="700" style="border:4px solid black;"></canvas>
    <script>
    var canvas = document.getElementById("myCanvas");
    var ctx = canvas.getContext("2d");
    // datos de barras
    var datos =[100, 200, 300, 400, 500, 600, 700];
    var colores = ["red", "pink", "green", "orange", "black", "purple", "yellow"];

// Dibujar barras
    var x = 50; // posicion inicial en x
    var width = 50; // ancho de cada barra
    for (var i = 0; i < datos.length; i++) {
        ctx.beginPath();
        ctx.rect(x, 700 - datos[i], width, datos[i]); // x, y, ancho, alto
        ctx.fillStyle = colores[i];
        ctx.fill();
        ctx.stroke();
        x += width + 20; // espacio entre barras
    }

</script>



</body>
</html>
