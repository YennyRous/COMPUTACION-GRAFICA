<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h2>Grafico de una función</h2>
    <canvas id="myCanvas" width="500" height="500" style="border: 1px solid black;"></canvas>

    <script>
        var canvas = document.getElementById('myCanvas');
        var ctx = canvas.getContext('2d');

    // Dibujar los ejes
    ctx.beginPath();
    ctx.moveTo(0, 250);   //EJE X
    ctx.lineTo(500, 250);
    ctx.moveTo(250, 0);   //EJE Y
    ctx.lineTo(250, 500);
    ctx.stroke();


    // Función a graficar: y = x^2
    ctx.beginPath();

    
    for (var x = -250; x<250; x++) {
        var y = -Math.pow(x , 2) / 100; // función para que se ajuste al canvas
        ctx.lineTo(250 + x, 250 - y); // Ajustamos la posición para centrar en el canvas
    }

    ctx.strokeStyle = 'blue'; // color de la funcion
    ctx.stroke();


    </script>

</body>
</html>
