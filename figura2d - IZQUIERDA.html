<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h2>Gráfico de una función (Hacia la izquierda)</h2>
    <canvas id="myCanvas" width="500" height="500" style="border: 1px solid black;"></canvas>

    <script>
        var canvas = document.getElementById('myCanvas');
        var ctx = canvas.getContext('2d');

        // Dibujar los ejes
        ctx.beginPath();
        ctx.moveTo(0, 250);   //EJE X
        ctx.lineTo(500, 250);
        ctx.moveTo(250, 0);   //EJE Y
        ctx.lineTo(250, 500);
        ctx.strokeStyle = 'black';
        ctx.stroke();

        // Función a graficar: x = -y^2 (Abre hacia la izquierda)
        ctx.beginPath();
        
        for (var y = -250; y < 250; y++) {
            // AQUÍ ESTÁ EL CAMBIO: Agregamos el signo negativo "-"
            var x = -Math.pow(y, 2) / 100; 
            
            ctx.lineTo(250 + x, 250 - y); 
        }

        ctx.strokeStyle = 'blue'; 
        ctx.stroke();

    </script>

</body>
</html>
