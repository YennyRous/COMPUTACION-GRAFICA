<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad Cuadrado y Triángulo</title>
    <style>
        body {
            background-color: #f8f8f8;
            color: #333;
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        h2 {
            color: #444;
        }
    </style>
</head>
<body>
    <h2>Realizado POR: YENNY CAMACHO RODRIGUEZ</h2>
    <CANVAS id="myCanvas" width="500" height="500" style="border:4px solid black; background-color: white;"></CANVAS>

    <SCRIPt>
        var canvas = document.getElementById("myCanvas");
        var ctx = canvas.getContext("2d");

        // --- Dibujar el texto de la actividad ---
        ctx.font = "20px Arial";
        ctx.fillStyle = "blue";
        ctx.textAlign = "right"; // Alinear a la derecha
        ctx.fillText("ACTIVIDAD EN CLASE NRO. 1", canvas.width - 20, 30); // Posición x,y ajustada

        // --- Configurar el grosor y el color de las líneas para todos los contornos ---
        ctx.lineWidth = 3;
        ctx.strokeStyle = "blue";

        // --- Dibujar las dos grandes áreas de división (rectángulos superiores e inferiores) ---
        // Área superior (mitad superior del canvas)
        ctx.strokeRect(0, 0, canvas.width, canvas.height / 2);
        // Área inferior (mitad inferior del canvas)
        ctx.strokeRect(0, canvas.height / 2, canvas.width, canvas.height / 2);

        // --- Dibujar el cuadrado centrado en el área superior ---
        // Calculamos el centro de la mitad superior
        var centerX_top = canvas.width / 2;
        var centerY_top = canvas.height / 4;
        var squareSize = 100; // Tamaño del cuadrado (lado)

        // Dibujar el contorno del cuadrado (strokeRect dibuja solo el borde)
        ctx.strokeRect(centerX_top - squareSize / 2, centerY_top - squareSize / 2, squareSize, squareSize);


        // --- Dibujar el triángulo centrado en el área inferior ---
        // Calculamos el centro de la mitad inferior
        var centerX_bottom = canvas.width / 2;
        var centerY_bottom = (canvas.height * 3) / 4;
        var triangleHeight = 100; // Altura del triángulo
        var triangleBase = 100; // Base del triángulo

        // Definir los vértices del triángulo centrado
        ctx.beginPath();
        // Vértice superior
        ctx.moveTo(centerX_bottom, centerY_bottom - triangleHeight / 2); 
        // Vértice inferior derecho
        ctx.lineTo(centerX_bottom + triangleBase / 2, centerY_bottom + triangleHeight / 2);
        // Vértice inferior izquierdo
        ctx.lineTo(centerX_bottom - triangleBase / 2, centerY_bottom + triangleHeight / 2);
        ctx.closePath(); // Cerrar el triángulo automáticamente

        // Dibujar el contorno del triángulo
        ctx.stroke();

    </SCRIPt>
    
</body>
</html>
