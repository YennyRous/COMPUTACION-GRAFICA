<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Coseno Dinámico</title>

<style>
body{
    text-align: center;
    font-family: Arial;
}

canvas{
    border: 1px solid black;
}
</style>

</head>
<body>

<h2>Curva Coseno Dinámica con Ejes</h2>

<canvas id="canvas" width="700" height="400"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let desplazamiento = 0;

// Dibujar ejes
function dibujarEjes(){
    ctx.beginPath();

    // eje X
    ctx.moveTo(0, 200);
    ctx.lineTo(700, 200);

    // eje Y
    ctx.moveTo(350, 0);
    ctx.lineTo(350, 400);

    ctx.strokeStyle = "black";
    ctx.stroke();
}

function dibujar(){

    ctx.clearRect(0, 0, 700, 400);

    dibujarEjes();

    ctx.beginPath();

    for(let x = 0; x < 700; x++){
        let y = Math.cos((x + desplazamiento) * 0.02);
        let posY = 200 + y * 120;

        if(x === 0){
            ctx.moveTo(x, posY);
        } else {
            ctx.lineTo(x, posY);
        }
    }

    ctx.strokeStyle = "blue";
    ctx.lineWidth = 2;
    ctx.stroke();

    desplazamiento += 5;
}

setInterval(dibujar, 1000);

</script>

</body>
</html>
