<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bézier 3D</title>
<style>
body { margin:0; overflow:hidden; background:black; }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.z = 50;

// Puntos de control
let p0 = new THREE.Vector3(-20, -10, 0);
let p1 = new THREE.Vector3(-10, 30, 10);
let p2 = new THREE.Vector3(10, -30, -10);
let p3 = new THREE.Vector3(20, 10, 0);

// curva
const curve = new THREE.CubicBezierCurve3(p0,p1,p2,p3);

const points = curve.getPoints(100);
const geometry = new THREE.BufferGeometry().setFromPoints(points);

const material = new THREE.LineBasicMaterial({ color: 0xffffff });

const line = new THREE.Line(geometry, material);
scene.add(line);

// líneas tipo “malla”
let lines = [];

for(let i=0;i<1;i+=0.05){
    let geo = new THREE.BufferGeometry();
    let mat = new THREE.LineBasicMaterial({ color: new THREE.Color(`hsl(${i*360},100%,50%)`) });

    let pts = [];

    for(let t=0;t<=1;t+=0.02){
        let pA = curve.getPoint(t);
        let pB = curve.getPoint(1-t);

        pts.push(pA, pB);
    }

    geo.setFromPoints(pts);
    let l = new THREE.LineSegments(geo, mat);
    scene.add(l);
    lines.push(l);
}

// animación
function animate(){
    requestAnimationFrame(animate);

    line.rotation.y += 0.01;

    lines.forEach(l=>{
        l.rotation.x += 0.005;
        l.rotation.y += 0.005;
    });

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
